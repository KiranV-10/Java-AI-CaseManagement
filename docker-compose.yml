version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-case_management}
      POSTGRES_USER: ${POSTGRES_USER:-case_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-case_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-case_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-case_password}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
